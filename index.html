<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A* Map Editor</title>
    <style>
      * { box-sizing:border-box; }
      html, body { height:100%; }
      body {
        margin:0;
        padding:16px;
        min-height:100vh;
        font-family: Arial, sans-serif;
        background:#f8fafc;
        color:#0f172a;
      }
      main {
        width:100%;
        min-height:calc(100vh - 32px);
        padding:16px;
        display:flex;
        flex-direction:column;
        gap:10px;
        background:#fff;
        border-radius:12px;
        box-shadow:0 2px 10px rgba(0,0,0,.08);
        overflow:visible;
      }
      h1, p { margin:0; }
      .toolbar {
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        align-items:end;
      }
      label {
        display:flex;
        flex-direction:column;
        gap:4px;
        font-size:14px;
      }
      input, button {
        padding:6px 8px;
        font-size:14px;
      }
      .mode-group {
        display:flex;
        gap:6px;
        align-items:center;
      }
      .mode-btn.active {
        color:#fff;
        background:#334155;
        border-color:#334155;
      }
      .toggle-btn {
        margin-left:auto;
      }
      .canvas-wrap {
        width:100%;
        min-height:320px;
        overflow:visible;
        border:1px solid #cbd5e1;
        background:#e2e8f0;
      }
      .canvas-stage {
        width:max-content;
        height:max-content;
        min-width:100%;
        min-height:320px;
        display:flex;
        align-items:center;
        justify-content:center;
      }
      canvas {
        display:block;
        cursor:crosshair;
        touch-action:none;
        background-image:url('./test.png');
        background-position:center;
        background-repeat:no-repeat;
        background-size:cover;
      }
      .error {
        min-height:1.2em;
        color:#b91c1c;
      }
      .help {
        color:#475569;
      }
      textarea {
        width:100%;
        height:100px;
        resize:vertical;
        font-family:monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>A* algorithm</h1>
      <p>0 = off / 1 = on</p>

      <div class="toolbar">
        <label>w<input type="number" id="w" min="1" max="2000" value="500" /></label>
        <label>h<input type="number" id="h" min="1" max="2000" value="500" /></label>
        <button id="new" type="button">new map</button>
        <div class="mode-group">
          <button id="brush" class="mode-btn" type="button">brush</button>
          <button id="eraser" class="mode-btn" type="button">eraser</button>
        </div>
        <button id="invert" type="button">invert 0/1</button>
        <label>JSON import <input type="file" id="file" accept=".json,application/json,text/json" /></label>
        <button id="save" type="button">save</button>
        <button id="toggle-grid" class="toggle-btn" type="button" aria-controls="grid-panel" aria-expanded="true">hide grid</button>
      </div>

      <div id="grid-panel"><div class="canvas-wrap"><div class="canvas-stage"><canvas id="c"></canvas></div></div></div>
      <p id="err" class="error"></p>
      <p class="help">The grid has no inner horizontal slider. Use Shift + Wheel to move horizontally across the page.</p>
      <textarea id="out" readonly></textarea>
    </main>

    <script>
      const c = document.getElementById('c');
      const ctx = c.getContext('2d');
      const main = document.querySelector('main');
      const out = document.getElementById('out');
      const err = document.getElementById('err');
      const canvasWrap = document.querySelector('.canvas-wrap');
      const wInput = document.getElementById('w');
      const hInput = document.getElementById('h');
      const newBtn = document.getElementById('new');
      const brushBtn = document.getElementById('brush');
      const eraserBtn = document.getElementById('eraser');
      const invertBtn = document.getElementById('invert');
      const fileInput = document.getElementById('file');
      const saveBtn = document.getElementById('save');
      const toggleGridBtn = document.getElementById('toggle-grid');
      const gridPanel = document.getElementById('grid-panel');

      const INITIAL_VIEW_SCALE = 2;
      const MAX_INITIAL_CELL = 64;
      const state = {
        w: 500,
        h: 500,
        walls: [],
        cell: 16,
        draw:false,
        mode:1,
        seen:new Set(),
        activePointerId: null,
        touchPointers: new Set(),
        touchPositions: new Map(),
      };

      function showError(msg=''){ err.textContent = msg; }
      function normalizeWheelValue(delta, mode){
        if(mode === WheelEvent.DOM_DELTA_LINE) return delta * 16;
        if(mode === WheelEvent.DOM_DELTA_PAGE) return delta * window.innerHeight;
        return delta;
      }
      function parseIntStrict(v, name){
        const n = Number(v);
        if(!Number.isInteger(n) || n < 1 || n > 2000) {
          throw new Error(`${name} must be an integer between 1 and 2000.`);
        }
        return n;
      }
      function centerCanvas(){
        const pageScroller = document.scrollingElement || document.documentElement;
        const rect = c.getBoundingClientRect();
        const absoluteLeft = rect.left + pageScroller.scrollLeft;
        const desiredLeft = Math.floor((window.innerWidth - c.width) / 2);
        pageScroller.scrollLeft = Math.max(0, Math.floor(absoluteLeft - desiredLeft));
      }
      function resizeCanvas({ center = false } = {}){
        const wrapTop = canvasWrap.getBoundingClientRect().top;
        const availableWidth = Math.max(1, Math.floor(main.clientWidth - 2));
        const availableHeight = Math.max(320, Math.floor(window.innerHeight - wrapTop - 16));
        const fitCell = Math.min(availableWidth / state.w, availableHeight / state.h);
        const cell = Math.min(MAX_INITIAL_CELL, fitCell * INITIAL_VIEW_SCALE);

        c.width = Math.max(1, Math.floor(state.w * cell));
        c.height = Math.max(1, Math.floor(state.h * cell));
        state.cell = Math.min(c.width / state.w, c.height / state.h);
        if(center) requestAnimationFrame(centerCanvas);
      }
      function resetWalls(){
        state.walls = Array.from({ length: state.h }, () => Array.from({ length: state.w }, () => 0));
      }
      function payload(){
        return { n: state.w, k: state.h, walls: state.walls.flat() };
      }
      function syncOutput(){
        out.value = JSON.stringify(payload());
      }
      function setMode(mode){
        state.mode = mode;
        brushBtn.classList.toggle('active', mode === 1);
        eraserBtn.classList.toggle('active', mode === 0);
      }
      function drawGrid(){
        ctx.clearRect(0, 0, c.width, c.height);

        for(let row = 0; row < state.h; row += 1){
          for(let col = 0; col < state.w; col += 1){
            if(state.walls[row][col] !== 1) continue;
            ctx.fillStyle = '#334155';
            ctx.fillRect(col * state.cell, row * state.cell, state.cell, state.cell);
          }
        }

        ctx.strokeStyle = 'rgba(226, 232, 240, 0.9)';
        ctx.lineWidth = 1;

        for(let x = 0; x <= state.w; x += 1){
          ctx.beginPath();
          ctx.moveTo(x * state.cell + 0.5, 0);
          ctx.lineTo(x * state.cell + 0.5, c.height);
          ctx.stroke();
        }

        for(let y = 0; y <= state.h; y += 1){
          ctx.beginPath();
          ctx.moveTo(0, y * state.cell + 0.5);
          ctx.lineTo(c.width, y * state.cell + 0.5);
          ctx.stroke();
        }
      }
      function setGridExpanded(expanded){
        gridPanel.hidden = !expanded;
        toggleGridBtn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        toggleGridBtn.textContent = expanded ? 'hide grid' : 'show grid';
        if(expanded){
          resizeCanvas({ center:true });
          drawGrid();
        }
      }
      function stopDrawing(){
        state.draw = false;
        state.activePointerId = null;
        state.seen.clear();
      }
      function updateTouchInteractionMode(){
        if(state.touchPointers.size >= 2){
          stopDrawing();
          c.style.touchAction = 'auto';
          for(const pointerId of state.touchPointers){
            if(c.hasPointerCapture(pointerId)) c.releasePointerCapture(pointerId);
          }
          return;
        }
        c.style.touchAction = 'none';
      }
      function eventToCell(e){
        const rect = c.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / state.cell);
        const y = Math.floor((e.clientY - rect.top) / state.cell);
        if(x < 0 || y < 0 || x >= state.w || y >= state.h) return null;
        return { x, y };
      }
      function applyAt(e){
        const cell = eventToCell(e);
        if(!cell) return;

        const key = `${cell.x},${cell.y}`;
        if(state.seen.has(key)) return;

        state.seen.add(key);
        state.walls[cell.y][cell.x] = state.mode;
        drawGrid();
        syncOutput();
      }

      c.addEventListener('pointerdown', e => {
        showError('');
        if(e.pointerType === 'touch'){
          state.touchPointers.add(e.pointerId);
          state.touchPositions.set(e.pointerId, { x:e.clientX, y:e.clientY });
          updateTouchInteractionMode();

          if(state.touchPointers.size !== 1){
            stopDrawing();
            return;
          }
        }
        if(!eventToCell(e)) return;
        state.draw = true;
        state.activePointerId = e.pointerId;
        state.seen.clear();
        if(!c.hasPointerCapture(e.pointerId)) c.setPointerCapture(e.pointerId);
        applyAt(e);
      });
      c.addEventListener('pointermove', e => {
        if(e.pointerType === 'touch'){
          if(!state.touchPointers.has(e.pointerId)) return;
          state.touchPositions.set(e.pointerId, { x:e.clientX, y:e.clientY });
          updateTouchInteractionMode();
          if(state.touchPointers.size !== 1) return;
        }
        if(state.draw && state.activePointerId === e.pointerId) applyAt(e);
      });
      c.addEventListener('pointerup', e => {
        if(e.pointerType === 'touch'){
          state.touchPointers.delete(e.pointerId);
          state.touchPositions.delete(e.pointerId);
          updateTouchInteractionMode();
        }
        if(state.activePointerId === e.pointerId) stopDrawing();
      });
      c.addEventListener('pointercancel', e => {
        if(e.pointerType === 'touch'){
          state.touchPointers.delete(e.pointerId);
          state.touchPositions.delete(e.pointerId);
          updateTouchInteractionMode();
        }
        if(state.activePointerId === e.pointerId) stopDrawing();
      });
      canvasWrap.addEventListener('wheel', e => {
        e.preventDefault();
        const pageScroller = document.scrollingElement || document.documentElement;
        const deltaX = normalizeWheelValue(e.deltaX, e.deltaMode);
        const deltaY = normalizeWheelValue(e.deltaY, e.deltaMode);
        if(e.shiftKey){
          pageScroller.scrollLeft += deltaY;
          return;
        }
        pageScroller.scrollTop += deltaY;
        pageScroller.scrollLeft += deltaX;
      }, { passive:false });

      newBtn.addEventListener('click', () => {
        try{
          state.w = parseIntStrict(wInput.value, 'width');
          state.h = parseIntStrict(hInput.value, 'height');
          resizeCanvas({ center:true });
          resetWalls();
          drawGrid();
          syncOutput();
          showError('');
        }catch(e){
          showError(e.message);
        }
      });

      brushBtn.addEventListener('click', () => setMode(1));
      eraserBtn.addEventListener('click', () => setMode(0));
      invertBtn.addEventListener('click', () => {
        state.walls = state.walls.map(row => row.map(v => v === 1 ? 0 : 1));
        drawGrid();
        syncOutput();
      });

      fileInput.addEventListener('change', async () => {
        const f = fileInput.files?.[0];
        if(!f) return;

        try{
          const data = JSON.parse(await f.text());
          const w = parseIntStrict(data.n ?? data.width, 'n');
          const h = parseIntStrict(data.k ?? data.height, 'k');

          if(!Array.isArray(data.walls)) throw new Error('walls array is required.');

          const flat = data.walls.flat();
          if(flat.length !== w * h) throw new Error('walls length must match n * k.');
          if(!flat.every(v => v === 0 || v === 1)) throw new Error('walls values must be 0 or 1.');

          state.w = w;
          state.h = h;
          wInput.value = String(w);
          hInput.value = String(h);
          resizeCanvas({ center:true });
          state.walls = Array.from({ length: h }, (_, row) => flat.slice(row * w, (row + 1) * w));
          drawGrid();
          syncOutput();
          showError('');
        }catch(e){
          showError(`import failed: ${e.message}`);
        }
      });

      saveBtn.addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(payload(), null, 2)], { type:'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'custom_map.json';
        a.click();
        URL.revokeObjectURL(a.href);
      });

      toggleGridBtn.addEventListener('click', () => {
        const expanded = toggleGridBtn.getAttribute('aria-expanded') !== 'true';
        setGridExpanded(expanded);
      });

      window.addEventListener('resize', () => {
        resizeCanvas();
        drawGrid();
      });

      setMode(1);
      resizeCanvas({ center:true });
      resetWalls();
      drawGrid();
      syncOutput();
      setGridExpanded(true);
    </script>
  </body>
</html>
